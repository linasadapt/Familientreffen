<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title data-i18n="org.title">Organizer · Family Gathering 2026</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23A66A3A'/%3E%3C/svg%3E" />
</head>
<body data-page="organizer">

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true"></span>
      <span data-i18n="brand">Family Gathering 2026</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="index.html"    data-page-link="home"     data-i18n="nav.home">Practical info</a>
      <a href="register.html" data-page-link="register" data-i18n="nav.register">Register</a>
      <a href="about.html"    data-page-link="about"    data-i18n="nav.about">About Druskininkai</a>
    </nav>
    <div class="lang" role="group" aria-label="Language">
      <button data-lang="en">EN</button>
      <button data-lang="lt">LT</button>
      <button data-lang="de">DE</button>
    </div>
  </div>
</header>

<main>

<section class="hero">
  <div class="hero-inner container">
    <h1 data-i18n="org.title">Organizer view</h1>
    <p class="lead" data-i18n="org.lead">Live counts and a CSV export for planning.</p>
  </div>
</section>

<section class="block" style="padding-top: 28px;">
  <div class="container" style="max-width: 1100px;">

    <div id="org-token-form" class="form-section" style="max-width: 480px;">
      <div class="field">
        <label data-i18n="org.tokenLabel">Organizer token</label>
        <input class="input" id="org-token-input" type="password" autocomplete="off" />
      </div>
      <div class="form-actions" style="margin-top: 12px;">
        <button class="btn btn-primary" id="org-token-submit" data-i18n="org.tokenSubmit">Open dashboard</button>
      </div>
    </div>

    <div id="org-dashboard" class="hidden">
      <div class="form-actions" style="margin-bottom: 12px;">
        <button class="btn btn-ghost btn-sm" id="org-refresh" data-i18n="org.refresh">Refresh</button>
        <button class="btn btn-primary btn-sm" id="org-export" data-i18n="org.export">Export CSV</button>
      </div>
      <div class="metric-grid" id="metric-grid"></div>
      <div class="scroll-x">
        <table class="responses" id="responses-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      <p id="org-empty" class="muted" style="display:none;" data-i18n="org.empty">No registrations yet.</p>
    </div>

  </div>
</section>

</main>

<footer class="site-footer">
  <div class="row">
    <div>
      <div data-i18n="footer.dates">8&ndash;9 August 2026 &middot; Druskininkai, Lithuania</div>
      <div><span data-i18n="footer.lastUpdated">Last updated</span>: <span data-build-date>2026-04-27</span></div>
    </div>
    <div>
      <span data-i18n="footer.contact">Contact</span>: <a data-organizer-email href="mailto:linas@adaptagency.com">linas@adaptagency.com</a>
    </div>
  </div>
</footer>

<script src="shared.js"></script>
<script>
/* =========================================================
   Organizer view — token-gated metrics + table + CSV
   ========================================================= */
(function () {
  "use strict";

  const TOKEN_KEY = "fg2026.orgToken";
  const tokenForm  = document.getElementById("org-token-form");
  const tokenInput = document.getElementById("org-token-input");
  const dashboard  = document.getElementById("org-dashboard");

  function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
  function setToken(v) { localStorage.setItem(TOKEN_KEY, v); }

  document.getElementById("org-token-submit").addEventListener("click", () => {
    setToken(tokenInput.value.trim());
    showDashboard();
  });
  document.getElementById("org-refresh").addEventListener("click", refresh);
  document.getElementById("org-export").addEventListener("click", () => downloadCsv(window._lastRows || []));

  if (getToken()) showDashboard();

  function showDashboard() {
    if (!getToken()) return;
    tokenForm.classList.add("hidden");
    dashboard.classList.remove("hidden");
    refresh();
  }

  async function loadResponses() {
    if (!window.FG_CONFIG.endpoint) return [];
    try {
      const res = await fetch(window.FG_CONFIG.endpoint + "?token=" + encodeURIComponent(getToken()));
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      return Array.isArray(json) ? json : (json.rows || []);
    } catch (e) { console.error(e); return []; }
  }

  function asArr(v) { return Array.isArray(v) ? v : (v ? String(v).split(",").map(s=>s.trim()).filter(Boolean) : []); }

  function renderMetrics(rows) {
    const persons = rows.length;
    const byMean = m => rows.filter(r => (r.mean||"").toLowerCase() === m).length;
    const byCar      = byMean("car") + byMean("camper");
    const byPlane    = byMean("plane");
    const byTrainBus = byMean("train") + byMean("bus");
    const byAcc = a => rows.filter(r => r.accommodation === a).length;
    const accGroup  = byAcc("group");
    const accHotel  = byAcc("hotel");
    const accCamper = byAcc("camper");
    const accOwn    = byAcc("own");
    const diets = rows.filter(r => {
      const d = (r.diet || "").trim().toLowerCase();
      return d && !["no","none","-","keine","nera","nėra","no restrictions","keine einschränkungen","nera apribojimu","nėra apribojimų","be apribojimu","be apribojimų"].includes(d);
    }).length;

    const t = (k) => window.FG.t(k);
    const items = [
      [persons,    t("org.m.persons")],
      [byCar,      t("org.m.byCar")],
      [byPlane,    t("org.m.byPlane")],
      [byTrainBus, t("org.m.byTrain")],
      [accGroup,   t("org.m.accGroup")],
      [accHotel,   t("org.m.accHotel")],
      [accCamper,  t("org.m.accCamper")],
      [accOwn,     t("org.m.accOwn")],
      [diets,      t("org.m.diets")]
    ];
    document.getElementById("metric-grid").innerHTML = items.map(([n, l]) =>
      `<div class="metric"><div class="n">${n}</div><div class="l">${l}</div></div>`
    ).join("");
  }

  function renderTable(rows) {
    const tbl = document.getElementById("responses-table");
    if (!rows.length) {
      tbl.querySelector("thead").innerHTML = "";
      tbl.querySelector("tbody").innerHTML = "";
      document.getElementById("org-empty").style.display = "block";
      return;
    }
    document.getElementById("org-empty").style.display = "none";
    const cols = ["submittedAt","name","email","country","city","age_group",
      "arrival","mean","departure","departure_time","diet",
      "accommodation","activities","notes"];
    tbl.querySelector("thead").innerHTML = "<tr>" + cols.map(c => `<th>${c}</th>`).join("") + "</tr>";
    const esc = s => String(s ?? "").replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
    tbl.querySelector("tbody").innerHTML = rows.map(r =>
      "<tr>" + cols.map(c => `<td>${esc(Array.isArray(r[c]) ? r[c].join(", ") : r[c])}</td>`).join("") + "</tr>"
    ).join("");
  }

  function downloadCsv(rows) {
    if (!rows.length) return;
    const cols = Array.from(rows.reduce((s,r) => { Object.keys(r).forEach(k => s.add(k)); return s; }, new Set()));
    const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
    const csv = [cols.join(",")].concat(rows.map(r => cols.map(c => {
      const v = r[c]; return esc(Array.isArray(v) ? v.join("; ") : v);
    }).join(","))).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `family_gathering_2026_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  async function refresh() {
    const rows = await loadResponses();
    window._lastRows = rows;
    renderMetrics(rows);
    renderTable(rows);
  }

  document.addEventListener("fg:langchange", () => { if (window._lastRows) renderMetrics(window._lastRows); });
})();
</script>
</body>
</html>
